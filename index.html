<!DOCTYPE HTML>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>SameSame</title>

    <link rel="manifest" href="./manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FutbolBoton">

    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            /* Evita que se pueda arrastrar la pantalla en móviles */
            touch-action: none; 
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <script src="./js/phaser.min.js"></script>
	<script src="./js/main.js" ></script>
	<script src="./js/carga.js" ></script>
	<script src="./js/entrada.js" ></script>
	<script src="./js/inicio.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker activo', reg))
                    .catch(err => console.warn('Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
